<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movieplex BD - Ultimate OTT Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-yellow-500 selection:text-black">

    <!-- NAVIGATION BAR -->
    <nav class="sticky top-0 z-50 flex items-center justify-between px-6 py-4 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="flex items-center gap-3">
            <span class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500">MOVIEPLEX<span class="text-white">BD</span></span>
        </div>
        <div class="relative w-72">
            <input type="text" id="search-input" placeholder="Search catalog..." class="w-full px-4 py-2 text-sm rounded-full bg-slate-800 border border-slate-700 focus:outline-none focus:border-yellow-500 transition text-slate-200">
        </div>
    </nav>

    <!-- MAIN VIEW CONTAINER -->
    <main id="main-layout" class="relative min-h-screen pb-24">
        
        <!-- SPOTLIGHT 3D CAROUSEL (DUMMY PLACEHOLDER FOR UI SPACE) -->
        <div class="relative h-[45vh] sm:h-[60vh] bg-gradient-to-b from-slate-900 to-slate-950 flex items-end p-8 overflow-hidden">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(234,179,8,0.08),transparent_60%)]"></div>
            <div class="relative z-10 max-w-2xl space-y-3">
                <span class="px-3 py-1 text-xs font-semibold bg-yellow-500 text-black rounded-full uppercase tracking-wider">Spotlight</span>
                <h1 class="text-4xl sm:text-6xl font-extrabold tracking-tight">Welcome to Movieplex BD</h1>
                <p class="text-slate-400 text-sm sm:text-base">Experience ad-free, high-end streaming with premium user aesthetics.</p>
            </div>
        </div>

        <!-- CONTENT ROWS WITH TAILWIND NEGATIVE MARGIN -->
        <div class="-mt-[50px] sm:-mt-[64px] relative z-20 px-6 space-y-10">
            <div>
                <h2 class="text-xl font-bold tracking-tight mb-4 text-slate-300">Trending Now</h2>
                <div id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 py-2">
                    <!-- Dynamic Grid Insertion -->
                </div>
            </div>
        </div>
    </main>

    <!-- DETAILS VIEW (DYNAMICALLY TOGGLED) -->
    <div id="details-view-container" class="hidden min-h-screen bg-[#0c0f1d] px-4 md:px-16 py-6 space-y-6 z-50 relative">
        <button onclick="backToMainView()" class="bg-slate-800 hover:bg-slate-700 text-white border border-slate-700 px-4 py-1.5 rounded-full text-xs font-bold transition flex items-center shadow-lg cursor-pointer">
            <span>&lsaquo; Back</span>
        </button>

        <!-- VIDEO PLAYER SECTION -->
        <div class="w-full relative pt-[56.25%] md:pt-[45%] bg-black rounded-2xl overflow-hidden border border-white/5 group shadow-2xl">
            <div id="player-shield" class="absolute inset-0 bg-black/95 backdrop-blur-sm z-30 flex flex-col justify-center items-center space-y-3 cursor-pointer p-4 text-center" onclick="activatePlayerFrame()">
                <div class="w-14 h-14 md:w-16 md:h-16 bg-yellow-500 text-black rounded-full flex items-center justify-center font-black text-xl shadow-[0_0_30px_rgba(234,179,8,0.4)] transition transform group-hover:scale-110">&blacktriangleright;</div>
                <div class="text-xs font-block tracking-widest text-yellow-500 uppercase flex items-center space-x-1"><span>Play Now</span><span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-ping ml-1.5"></span></div>
            </div>
            
            <!-- SECURE IFRAME PLAYER WITHOUT SANDBOX ATTRIBUTE TO PREVENT BLOCKING -->
            <iframe id="details-video-iframe" src="" class="absolute inset-0 w-full h-full border-0 z-10" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>

        <!-- SERVER CONTROLS AND DETAILS -->
        <div class="w-full bg-gradient-to-r from-yellow-500/10 via-amber-500/5 to-transparent p-5 rounded-xl border border-yellow-500/20 shadow-[0_0_15px_rgba(234,179,8,0.05)] flex flex-col sm:flex-row items-center justify-between gap-3">
            <div class="flex flex-wrap items-center gap-2" id="details-server-container"></div>
            <div class="flex items-center space-x-2 bg-black/40 px-4 py-1.5 rounded-full border border-yellow-500/30 shadow-md">
                <span class="w-2 h-2 rounded-full bg-yellow-500 animate-ping"></span>
                <span class="text-[10px] font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-200 uppercase">Powered by @Nazmulsblog</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-gradient-3 gap-8 items-start pt-2">
            <div class="lg:col-span-2 space-y-5">
                <div class="space-y-2">
                    <h2 id="details-title" class="text-2xl md:text-4xl font-black text-white tracking-wide">Movie Title</h2>
                    <div class="flex flex-wrap items-center gap-3 text-xs text-slate-400 font-medium">
                        <span id="details-year" class="bg-slate-800 text-slate-200 px-2.5 py-0.5 rounded-md font-bold">----</span>
                        <span id="details-rating" class="text-yellow-400 font-bold flex items-center gap-1">⭐ --</span>
                        <span id="details-runtime" class="border border-slate-700 px-2 py-0.5 rounded-md text-[11px]">-- min</span>
                        <span id="details-country" class="uppercase text-[10px] tracking-wider bg-slate-800/60 px-2 py-0.5 rounded">--</span>
                    </div>
                </div>
                <p id="details-plot" class="text-sm md:text-base text-slate-300 leading-relaxed max-w-4xl">Movie description plot will render here...</p>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT CORE ENGINE -->
    <script>
        let activePlayerSrc = "";
        let currentViewingMovieObj = null;

        // DUMMY STATE REPLICATING OTT ARCHITECTURE
        const mockMovie = {
            id: "m1",
            title: "Sample Premium Stream",
            plot: "An elite cinematic experience deployed via secure hybrid playback architecture.",
            year: "2026",
            runtime: "142",
            rating: "8.9",
            country: "US",
            videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ" // Replace with your standard scraper stream URL
        };

        function loadMockData() {
            const grid = document.getElementById('movies-grid');
            grid.innerHTML = `
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 space-y-3 hover:border-yellow-500/40 transition cursor-pointer group" onclick="openDetailsView()">
                    <div class="aspect-[2/3] bg-slate-800 rounded-lg overflow-hidden flex items-center justify-center text-slate-600 font-bold">Poster</div>
                    <h3 class="font-bold text-sm tracking-tight truncate group-hover:text-yellow-400 transition">${mockMovie.title}</h3>
                </div>
            `;
        }

        function openDetailsView() {
            document.getElementById('main-layout').classList.add('hidden');
            document.getElementById('details-view-container').classList.remove('hidden');
            
            document.getElementById('details-title').innerText = mockMovie.title;
            document.getElementById('details-plot').innerText = mockMovie.plot;
            document.getElementById('details-year').innerText = mockMovie.year;
            document.getElementById('details-runtime').innerText = mockMovie.runtime + " min";
            document.getElementById('details-rating').innerText = "⭐ " + mockMovie.rating;
            document.getElementById('details-country').innerText = mockMovie.country;

            activePlayerSrc = mockMovie.videoUrl;
            currentViewingMovieObj = mockMovie;

            // Reset Player State UI
            document.getElementById('player-shield').classList.remove('hidden');
            document.getElementById('details-video-iframe').src = "";
        }

        function backToMainView() {
            document.getElementById('details-video-iframe').src = "";
            document.getElementById('details-view-container').classList.add('hidden');
            document.getElementById('main-layout').classList.remove('hidden');
        }

        // 🌟 ADVANCED CLICK INTERCEPTOR AND ANTI-POPUP AD SHIELD
        function activatePlayerFrame() {
            document.getElementById('player-shield').classList.add('hidden');
            
            const iframe = document.getElementById('details-video-iframe');
            let finalSrc = activePlayerSrc;
            
            if (!finalSrc.includes('autoplay=')) {
                finalSrc += (finalSrc.includes('?') ? '&' : '?') + 'autoplay=1&muted=0';
            }
            
            // উইন্ডো ওপেনিং মেকানিজম হাইজ্যাক (যাতে আইফ্রেম কোনো পপ-আপ বা নতুন ট্যাব খুলতে না পারে)
            window.open = function() { return null; };
            
            iframe.src = finalSrc;
            
            iframe.onload = function() {
                try {
                    // আইফ্রেমের ভেতরের উইন্ডো অবজেক্টে এক্সেস থাকলে সেটারও উইন্ডো ওপেন মেকানিজম ব্লক
                    if(iframe.contentWindow) {
                        iframe.contentWindow.open = function() { return null; };
                    }
                    iframe.focus();
                } catch(e) {
                    // ক্রস-অরিজিন পলিসি থাকলে ব্যাকগ্রাউন্ড ফোকাস লক
                    setTimeout(() => { iframe.focus(); }, 200);
                }
            };

            // মোবাইলের জন্য এক্সট্রা প্রোটেকশন: অ্যাপ থেকে ফোকাস চলে যাওয়ার ট্রাই করলেই ফেরত আনা
            window.addEventListener('blur', function() {
                if (document.activeElement === iframe) {
                    setTimeout(() => { window.focus(); }, 100);
                }
            });

            if (typeof cacheUserPlaybackPreferences === "function") {
                cacheUserPlaybackPreferences(currentViewingMovieObj);
            }
        }

        window.onload = loadMockData;
    </script>
</body>
</html>
